<div class="page-container">
  <div class="page-header">
    <h1>Otros Analistas</h1>
    <p class="subtitle">{{ otherAnalystsIncidents.length }} incidente{{ otherAnalystsIncidents.length !== 1 ? 's' : '' }} (excluyendo bandejas principales)</p>
    <div class="header-actions">
      <button class="btn-copy-large" (click)="copyAllIncidents()">
        📋 Copiar
      </button>
      <button class="btn-export-excel" (click)="exportToExcel()" [disabled]="otherAnalystsIncidents.length === 0">
        📅 Excel
      </button>
    </div>
  </div>

  <!-- Mensaje de copiado -->
  <div class="copy-message" *ngIf="copiedMessage">
    ✅ {{ copiedMessage }}
  </div>

  <app-group-analyst-tree
    [groups]="groups"
    emptyMessage="No hay incidentes fuera de las bandejas principales.">
  </app-group-analyst-tree>
</div>
