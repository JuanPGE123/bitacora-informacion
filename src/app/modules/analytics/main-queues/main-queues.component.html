<div class="page-container">
  <div class="page-header">
    <h1>Bandejas Principales</h1>
    <p class="subtitle">{{ mainQueuesIncidents.length }} incidente{{ mainQueuesIncidents.length !== 1 ? 's' : '' }} en bandejas principales</p>
    <div class="header-actions">
      <button class="btn-copy-large" (click)="copyAllIncidents()">
        📋 Copiar
      </button>
      <button class="btn-export-excel" (click)="exportToExcel()" [disabled]="mainQueuesIncidents.length === 0">
        📅 Excel
      </button>
    </div>
  </div>

  <!-- Mensaje de copiado -->
  <div class="copy-message" *ngIf="copiedMessage">
    ✅ {{ copiedMessage }}
  </div>

  <app-group-analyst-tree
    [groups]="groups"
    emptyMessage="No hay incidentes en bandejas principales.">
  </app-group-analyst-tree>
</div>
